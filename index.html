<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Home</title>

  <link rel="stylesheet" href="style.css">

  <script src="libraries/p5.js"></script>
  <script src="libraries/p5.sound.min.js"></script>
</head>

<body>

  <div class="topnav">
    <a href="index.html">
      <img src="assets/logo.png" alt="logo" style="width:400px;height:100px;">
    </a>
      <a href="#" class="account-btn" id="accountBtn">👤 Account</a>
    
    <h1 id="moneyDisplay">Money: </h1>

    <style>
      .account-btn {
        background-color: grey; 
        color: white;
        padding: 10px 20px;
        text-decoration: none;
        border-radius: 10px;
        border-color: gold;
        display: inline-block;
        transition: 0.25s;
      }
      .account-btn:hover {
        background-color: #0056b3;
      }
    </style>
  </div>

  <div class="game-grid">

    <a href= "ridethebus.html" class="game-card Bus">
      <h2>Ride The Bus</h2>
    </a>

    <a href="blackjack.html" class="game-card Blackjack">
      <h2>Blackjack</h2>
    </a>

    <a href="plinko.html" class="game-card Plinko">
      <h2>Plinko</h2>
    </a>

    <a href="#" class="game-card Slotts">
      <h2>Slotts </h2>
    </a>

    <a href="#" class="game-card Mines">
      <h2>Mines</h2>
    </a>

    <a href="#" class="game-card Roulette">
      <h2>Roulette</h2>
    </a>

  </div>
<div class="popup" id="popup">
  <img src="Assets/popup.png" alt="popup image">
  <h2>ABOUT US</h2>
  <p>all bout no dimal type beans</p>
  <button id="closePopup">Close</button>
</div>

<script>
  const popup = document.getElementById("popup");
  const closeBtn = document.getElementById("closePopup");
  const accountBtn = document.getElementById("accountBtn");


  accountBtn.onclick = function() {
    popup.style.display = "block";
  };


  closeBtn.onclick = function() {
    popup.style.display = "none";
  };



    if (localStorage.getItem("money") === null) {
    localStorage.setItem("money", 5000);
  }

  function updateMoneyDisplay() {
    let money = parseInt(localStorage.getItem("money")) || 0;
    document.getElementById("moneyDisplay").textContent = "Money: $" + money;
  }

  updateMoneyDisplay();
</script>



</body>
</html>
